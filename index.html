<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Track overtime hours and share a clean report.">
  <title>Overtime</title>
  <link rel="manifest" href="./manifest.webmanifest?v=20260427b">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/app.css?v=20260427b">
</head>
<body>
  <svg style="display:none">
    <symbol id="ico-back" viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9,1 1,9 9,17"></polyline>
    </symbol>
  </svg>

  <div class="slider" id="slider">
    <section class="screen" id="screen-home" aria-label="Home">
      <div class="home-header">
        <h1 data-i18n="overtime"></h1>
        <div class="home-total" id="homeTotal">0h</div>
        <div class="home-period" id="homePeriod"></div>
      </div>
      <div class="home-name-row">
        <span class="home-name-text" id="homeNameText"></span>
        <button class="edit-name-btn" id="editNameButton" type="button" data-i18n-title="edit_name" data-i18n-aria-label="edit_name">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11.5 2.5a2.121 2.121 0 0 1 3 3L5 15H1v-4L11.5 2.5z"></path>
          </svg>
        </button>
      </div>
      <div class="month-filter-wrap" id="monthFilterWrap" hidden>
        <div class="month-filter-label" data-i18n="month_filter"></div>
        <div class="month-filter" id="monthFilter"></div>
      </div>
      <div class="entries-scroll" id="entriesScroll"></div>
      <div class="action-dock">
        <button class="dock-btn dock-btn-primary" id="startFlowButton" type="button">
          <span class="dock-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
              <line x1="8" y1="2" x2="8" y2="14"></line>
              <line x1="2" y1="8" x2="14" y2="8"></line>
            </svg>
          </span>
          <span class="dock-label" data-i18n="new_entry"></span>
        </button>
        <button class="dock-btn" id="openSendButton" type="button">
          <span class="dock-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2 7 9"></path>
              <path d="M14 2 9.5 14l-2.5-5-5-2.5L14 2Z"></path>
            </svg>
          </span>
          <span class="dock-label" data-i18n="send_report"></span>
        </button>
      </div>
    </section>

    <section class="screen" id="screen-date" aria-label="Date">
      <div class="topbar">
        <button class="back-btn" id="backFromDateButton" type="button">
          <svg aria-hidden="true"><use href="#ico-back"></use></svg>
          <span data-i18n="back"></span>
        </button>
        <span class="topbar-title" data-i18n="new_entry"></span>
        <span></span>
      </div>
      <div class="step-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="content">
        <div class="screen-label" data-i18n="step1"></div>
        <div class="screen-question" data-i18n="q_date"></div>
        <input type="date" class="field big-input" id="inputDate">
        <button class="cta-btn" id="continueFromDateButton" type="button" data-i18n="continue"></button>
      </div>
    </section>

    <section class="screen" id="screen-hours" aria-label="Hours">
      <div class="topbar">
        <button class="back-btn" id="backFromHoursButton" type="button">
          <svg aria-hidden="true"><use href="#ico-back"></use></svg>
          <span data-i18n="back"></span>
        </button>
        <span class="topbar-title" data-i18n="new_entry"></span>
        <span></span>
      </div>
      <div class="step-dots"><div class="dot done"></div><div class="dot active"></div><div class="dot"></div></div>
      <div class="content">
        <div class="screen-label" data-i18n="step2"></div>
        <div class="screen-question" data-i18n="q_hours"></div>
        <div class="picker-label" data-i18n="lbl_hours"></div>
        <div class="stepper">
          <button class="step-btn" id="decreaseHoursButton" type="button" aria-label="Decrease hours">-</button>
          <div class="step-value" id="dispHours">0</div>
          <button class="step-btn" id="increaseHoursButton" type="button" aria-label="Increase hours">+</button>
        </div>
        <div class="picker-label mt-24" data-i18n="lbl_minutes"></div>
        <div class="seg-control">
          <button class="seg-btn active" type="button" data-minutes="0">00</button>
          <button class="seg-btn" type="button" data-minutes="15">15</button>
          <button class="seg-btn" type="button" data-minutes="30">30</button>
          <button class="seg-btn" type="button" data-minutes="45">45</button>
        </div>
        <div class="time-preview" id="timePreview">0h</div>
        <button class="cta-btn" id="continueFromHoursButton" type="button" data-i18n="continue"></button>
      </div>
    </section>

    <section class="screen" id="screen-note" aria-label="Note">
      <div class="topbar">
        <button class="back-btn" id="backFromNoteButton" type="button">
          <svg aria-hidden="true"><use href="#ico-back"></use></svg>
          <span data-i18n="back"></span>
        </button>
        <span class="topbar-title" data-i18n="new_entry"></span>
        <button class="topbar-action" id="skipNoteButton" type="button" data-i18n="skip"></button>
      </div>
      <div class="step-dots"><div class="dot done"></div><div class="dot done"></div><div class="dot active"></div></div>
      <div class="content">
        <div class="screen-label" data-i18n="step3"></div>
        <div class="screen-question" data-i18n="q_notes"></div>
        <textarea class="field note-input" id="inputNote" rows="4" data-i18n-placeholder="note_placeholder"></textarea>
        <button class="cta-btn" id="continueFromNoteButton" type="button" data-i18n="continue"></button>
      </div>
    </section>

    <section class="screen" id="screen-confirm" aria-label="Confirm">
      <div class="topbar">
        <button class="back-btn" id="backFromConfirmButton" type="button">
          <svg aria-hidden="true"><use href="#ico-back"></use></svg>
          <span data-i18n="back"></span>
        </button>
        <span class="topbar-title" data-i18n="confirm_title"></span>
        <span></span>
      </div>
      <div class="content">
        <div class="screen-question" data-i18n="looks_good"></div>
        <div class="confirm-card">
          <div class="confirm-row">
            <span class="lbl" data-i18n="lbl_date"></span>
            <span class="val" id="confirmDate">-</span>
          </div>
          <div class="confirm-row">
            <span class="lbl" data-i18n="lbl_hours"></span>
            <span class="val" id="confirmHours">-</span>
          </div>
          <div class="confirm-row" id="confirmNoteRow">
            <span class="lbl" data-i18n="lbl_note"></span>
            <span class="val" id="confirmNote">-</span>
          </div>
        </div>
        <button class="cta-btn" id="saveEntryButton" type="button" data-i18n="add_entry"></button>
        <button class="cta-btn cta-btn-secondary" id="cancelEntryButton" type="button" data-i18n="cancel"></button>
      </div>
    </section>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop" aria-hidden="true"></div>
  <section class="sheet" id="sendSheet" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="sendSheetTitle">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-kicker" data-i18n="report_title"></div>
        <div class="sheet-title" id="sendSheetTitle" data-i18n="send_to_employer"></div>
      </div>
      <button class="sheet-close" id="closeSendButton" type="button" data-i18n-aria-label="back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="3" y1="3" x2="13" y2="13"></line>
          <line x1="13" y1="3" x2="3" y2="13"></line>
        </svg>
      </button>
    </div>
    <div class="report-box" id="reportBox"></div>
    <div class="send-actions">
      <button class="send-btn send-copy" id="copyReportButton" type="button" data-i18n="copy_report"></button>
      <button class="send-btn send-whatsapp" id="whatsappReportButton" type="button" data-i18n="whatsapp"></button>
    </div>
  </section>

  <div class="name-overlay" id="nameOverlay" role="dialog" aria-modal="true">
    <div class="lang-selector">
      <button class="lang-btn" type="button" data-lang="en">English</button>
      <button class="lang-btn" type="button" data-lang="fr">Francais</button>
      <button class="lang-btn" type="button" data-lang="pt">Portugues</button>
    </div>
    <div class="welcome-label" data-i18n="welcome"></div>
    <div class="welcome-title" data-i18n="whats_your_name"></div>
    <div class="name-fields">
      <input type="text" id="firstName" maxlength="40" autocomplete="given-name" data-i18n-placeholder="first_name">
      <input type="text" id="lastName" maxlength="40" autocomplete="family-name" data-i18n-placeholder="last_name">
    </div>
    <button class="cta-btn" id="submitNameButton" type="button" data-i18n="get_started"></button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./src/app.js?v=20260427b"></script>
</body>
</html>
